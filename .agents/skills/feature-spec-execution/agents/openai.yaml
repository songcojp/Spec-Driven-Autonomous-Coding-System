interface:
  display_name: "Feature Spec Execution"
  short_description: "Deliver Feature Specs in full or simplified mode"
  default_prompt: "Use $feature-spec-execution to execute the next ready Feature Spec end to end. Default to full mode unless simplified mode is requested. Full mode includes pre-implementation requirements/design review, clarification pauses when needed, implementation, targeted tests with explicit timeouts, Codex review written to temporary logs, owner analysis with spec-boundary citations before any fix, a mandatory 3-pass review-loop checkpoint with controlled continuation for real in-scope findings, regression testing, one final full-suite test before commit, PR creation, temporary artifact cleanup, and local worktree removal. Simplified mode keeps the same selection, worktree, pre-review, implementation, targeted testing, commit, PR, and cleanup lifecycle, but uses a code-review agent instead of codex review and skips the final full-suite test."
