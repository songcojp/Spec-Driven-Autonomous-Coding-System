interface:
  display_name: "Feature Spec Execution"
  short_description: "Deliver Feature Specs in full or simplified mode"
  default_prompt: "Use $feature-spec-execution to execute the next ready Feature Spec end to end. Default to simplified mode unless full mode is explicitly requested or required by high-risk scope. Simplified mode keeps the selection, worktree, pre-review, implementation, targeted testing, code-review agent, commit, PR, temporary artifact cleanup, and local worktree removal lifecycle, but does not call Codex review and skips the final full-suite test. Upgrade to full mode for shared architecture, data migrations, security/privacy changes, public API changes, large refactors, unclear test coverage, or broad blast radius; full mode adds Codex review written to temporary logs, owner analysis with spec-boundary citations before any fix, a mandatory 3-pass review-loop checkpoint with controlled continuation for real in-scope findings, regression testing, and one final full-suite test before commit."
