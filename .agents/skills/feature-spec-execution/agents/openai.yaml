interface:
  display_name: "Feature Spec Execution"
  short_description: "Deliver Feature Specs with review/test gates"
  default_prompt: "Use $feature-spec-execution to execute the next ready Feature Spec end to end, including pre-implementation requirements/design review, clarification pauses when needed, implementation, targeted tests with explicit timeouts, Codex review written to temporary logs, owner analysis with spec-boundary citations before any fix, at most 3 code-review/fix passes, regression testing, one final full-suite test before commit, PR creation, temporary log cleanup, and local worktree removal."
